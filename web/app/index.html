<!DOCTYPE html>
<html lang="cs">
<head>
    <title>Kam na oběd?</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/app.webmanifest">

    <link rel="icon" href="/static/icon_144.png" sizes="144x144">
    <link rel="icon" href="/static/icon_512.png" sizes="512x512">

    <script src="/static/script.js" type="module"></script>
</head>

<body class="is-clipped" x-data="app">
    <div class="hero">
        <div class="hero-body">
            <div class="container has-text-centered">
                <div class="title">
                    Kam na oběd?
                </div>

                <div class="subtitle" x-cloak>
                    <span class="is-capitalized" x-text="getLocalizedWeekName(selectedDate)"></span>,
                    <span x-text="getLocalizedLongFormatDate(selectedDate)"></span>
                </div>
            </div>
        </div>

        <div class="hero-foot">
            <nav class="tabs is-centered is-boxed">
                <ul>
                    <template x-for="day in getDaysInWeek()">
                        <li :class="{ 'is-active': selectedDate === day }" @click="selectedDate = day">
                            <a class="is-capitalized mx-1" x-text="getLocalizedWeekName(day)"></a>
                        </li>
                    </template>
                </ul>
            </nav>
        </div>
    </div>

    <div class="container py-6 has-min-height-screen">
        <noscript>
            <div class="has-text-centered">
                Pro plnou funkčnost této stránky je nutné povolit JavaScript.
            </div>
        </noscript>

        <div>
            <div class="columns is-tablet is-multiline is-8">
                <template x-for="(establishment, name) in establishments">
                    <div class="column is-half">
                        <a :href="establishment.homepage" target="_blank" class="is-size-4 my-1 p-2 mx-2" x-text="establishment.name"></a>

                        <hr class="my-2 mx-3">
                        
                        <template x-if="!establishment.linkOnly">
                            <div x-data="menu(name)">
                                <div x-show="!menu">
                                    <div>
                                        <div class="is-skeleton mx-2 my-3"><span>&nbsp;</span></div>
                                        <div class="is-skeleton mx-2 my-3"><span>&nbsp;</span></div>
                                        <div class="is-skeleton mx-2 my-3"><span>&nbsp;</span></div>
                                        <div class="is-skeleton mx-2 my-3"><span>&nbsp;</span></div>
                                        <div class="is-skeleton mx-2 my-3"><span>&nbsp;</span></div>
                                    </div>
                                </div>

                                <div x-show="menu" x-transition.opacity.duration.200ms>
                                    <div class="mx-2">
                                        <template x-if="menu === null || !menu[selectedDate]">
                                            <div class="my-1 p-2">
                                                Menu není k dispozici.
                                            </div>
                                        </template>

                                        <template x-if="menu !== null && menu[selectedDate]">
                                            <div>
                                                <template x-for="item in menu[selectedDate]">
                                                    <div class="is-flex is-mobile is-rounded my-1 px-2 py-1" :class="{'has-background-primary-soft': item.highlight}">
                                                        <div class="is-flex-grow-5 has-text-strong pr-4" x-text="item.name"></div>
                                                        
                                                        <template x-if="item.price">
                                                            <div x-text="`${item.price}&nbsp;Kč`"></div>
                                                        </template>
                                                    </div>
                                                </template>

                                                <template x-if="'week' in menu">
                                                    <div>
                                                        <div class="px-2 py-4">
                                                            Týdenní menu
                                                        </div>
                                                        
                                                        <template x-for="item in menu.week">
                                                            <div class="is-flex is-mobile is-rounded my-1 px-2 py-1" :class="{'has-background-primary-soft': item.highlight}">
                                                                <div class="is-flex-grow-5 has-text-strong pr-4" x-text="item.name"></div>
                                                                
                                                                <template x-if="item.price">
                                                                    <div x-text="`${item.price}&nbsp;Kč`"></div>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <template x-if="establishment.linkOnly">
                            <div class="my-3">
                                <a class="mx-2 px-2 py-1" :href="establishment.homepage" target="_blank">
                                    Odkaz na menu
                                </a>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div class="footer has-text-centered">
        <div>
            &copy; 2026 Josef Macháč
        </div>

        <div>
            <a href="https://github.com/MightyDuke/lunch-menu" target="_blank">GitHub</a>
        </div>
    </div>
</body>

</html>
